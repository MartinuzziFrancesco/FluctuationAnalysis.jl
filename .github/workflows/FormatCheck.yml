name: Format Check
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  runic:
    name: Runic formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install Runic
        run: julia --color=yes --project=@runic -e 'using Pkg; Pkg.add("Runic")'
      - name: Check formatting
        run: julia --color=yes --project=@runic -e 'using Runic; exit(Runic.main(["--check", "--diff", "."]))'
